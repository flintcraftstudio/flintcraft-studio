<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../flint.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--fc-birchwood); font-family: var(--fc-font-body); }
  .frame { padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .fc-flint-card { padding: 20px; position: relative; }
  h3 { margin: 0 0 8px; font-family: var(--fc-font-display); font-weight: 400; font-size: 20px; line-height: 1.25; }
  p  { margin: 0; font-size: 13px; line-height: 1.6; }
</style></head>
<body>
<div class="frame">
  <div class="fc-flint-card fc-flint-card--light fc-chip-tr" style="border: 0.5px solid var(--fc-slate-rim);">
    <div class="fc-flint-card__strike"></div>
    <div style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--fc-bracken);margin-bottom:8px;">Field Report №01</div>
    <h3 style="color:var(--fc-obsidian);">A clean-services site that reads like a referral.</h3>
    <p style="color:var(--fc-trail-dust);">Nautilus Group — Kennewick, WA. Inbound leads tripled in eight weeks.</p>
  </div>
  <div class="fc-flint-card fc-flint-card--dark fc-chip-tr">
    <div class="fc-flint-card__strike"></div>
    <div style="font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--fc-smoke);margin-bottom:8px;">Capability №03</div>
    <h3 style="color:var(--fc-birchwood);">Built to get found.</h3>
    <p style="color:var(--fc-ash);">SEO foundations, Google Business Profile, copy for the markets you serve.</p>
  </div>
</div>
</body></html>
