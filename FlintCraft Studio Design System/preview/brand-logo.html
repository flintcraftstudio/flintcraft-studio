<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Logo</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0}body{box-sizing:border-box;font-family:var(--fc-font-body);display:grid;grid-template-columns:1fr 1fr;min-height:100vh}
.pane{padding:22px;display:flex;align-items:center;gap:18px}
.pane img{height:96px;width:auto;display:block}
.brand .name{font-size:13px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase}
.brand .tag{font-family:var(--fc-font-display);font-style:italic;font-size:11px;letter-spacing:0.04em;margin-top:2px}
.lbl{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;margin-top:8px}
</style></head><body>
<div class="pane" style="background:var(--fc-birchwood)">
  <img src="../assets/logo.svg" alt="FlintCraft">
  <div class="brand">
    <div class="name" style="color:var(--fc-obsidian)">FlintCraft Studio</div>
    <div class="tag" style="color:var(--fc-bracken)">Still shaped by hand.</div>
    <div class="lbl" style="color:var(--fc-bracken)">On Birchwood</div>
  </div>
</div>
<div class="pane" style="background:var(--fc-obsidian)">
  <img src="../assets/logo.svg" alt="FlintCraft">
  <div class="brand">
    <div class="name" style="color:var(--fc-birchwood)">FlintCraft Studio</div>
    <div class="tag" style="color:var(--fc-smoke)">Still shaped by hand.</div>
    <div class="lbl" style="color:var(--fc-smoke)">On Obsidian</div>
  </div>
</div>
</body></html>
