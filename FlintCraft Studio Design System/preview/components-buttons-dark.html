<!doctype html>
<html><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../flint.css">
<style>
  html, body { margin: 0; padding: 0; background: var(--fc-obsidian); font-family: var(--fc-font-body); }
  .frame { padding: 24px; display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
  .label { display: block; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fc-smoke); margin-top: 6px; }
</style></head>
<body>
<div class="frame">
  <div>
    <a class="fc-flint-btn fc-chip-btn fc-flint-btn--primary-dark">Start a project</a>
    <span class="label">Primary · chipped top-right</span>
  </div>
  <div>
    <a class="fc-flint-btn fc-chip-btn fc-flint-btn--outline-dark">See our work →</a>
    <span class="label">Outline · chipped</span>
  </div>
  <div>
    <a style="font-family:var(--fc-font-body); font-size:13px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--fc-spark); border-bottom:1.5px solid var(--fc-spark); padding:10px 0; text-decoration:none; cursor:pointer;">Read the field report →</a>
    <span class="label">Ghost · underlined</span>
  </div>
</div>
</body></html>
