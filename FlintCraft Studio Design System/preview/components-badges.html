<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Badges</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0}body{background:var(--fc-birchwood);padding:22px;box-sizing:border-box;font-family:var(--fc-font-body)}
.bg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.surf{padding:18px;border-radius:var(--fc-radius-md)}
.light{background:var(--fc-parchment);border:0.5px solid var(--fc-slate-rim)}
.dark{background:var(--fc-obsidian)}
.lbl{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;margin-bottom:10px}
.row{display:flex;flex-wrap:wrap;gap:8px}
.b{padding:3px 10px;border-radius:3px;font-size:11px;font-weight:500;letter-spacing:0.05em}
.pill{border-radius:20px;padding:2px 10px;font-size:11px;font-weight:500;letter-spacing:0.05em}
</style></head><body>
<div class="bg">
  <div class="surf light">
    <div class="lbl" style="color:var(--fc-bracken)">On Parchment</div>
    <div class="row">
      <span class="b" style="background:#e8e4db;color:#4a4038">Marketing site</span>
      <span class="b" style="background:transparent;color:var(--fc-ember);border:0.5px solid var(--fc-ember)">Featured</span>
      <span class="pill" style="background:transparent;color:var(--fc-ember);border:0.5px solid var(--fc-ember)">Live</span>
    </div>
  </div>
  <div class="surf dark">
    <div class="lbl" style="color:var(--fc-smoke)">On Obsidian</div>
    <div class="row">
      <span class="b" style="background:var(--fc-flint);color:var(--fc-slate-rim)">Marketing site</span>
      <span class="b" style="background:#3d2208;color:#e8a84a">Featured</span>
      <span class="pill" style="background:var(--fc-flint);color:var(--fc-spark)">Live</span>
    </div>
  </div>
</div>
</body></html>
