<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>FlintCraft — Type Pairing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  body { background: var(--fc-birchwood); padding: 28px 32px; box-sizing: border-box; }
  .eyebrow { font-family: var(--fc-font-body); font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--fc-bracken); }
  .rule { width: 28px; height: 1px; background: var(--fc-ember); margin-bottom: 8px; }
  h1 { font-family: var(--fc-font-display); font-size: 44px; font-weight: 400; letter-spacing: -0.015em; line-height: 1.08; color: var(--fc-obsidian); margin: 6px 0 14px; max-width: 24ch; }
  h1 em { font-style: italic; color: var(--fc-ember); }
  p { font-family: var(--fc-font-body); font-size: 16px; line-height: 1.7; color: var(--fc-trail-dust); max-width: 56ch; margin: 0; }
</style>
</head>
<body>
  <div class="rule"></div>
  <div class="eyebrow">Who we are</div>
  <h1>One relationship. <em>Everything handled.</em></h1>
  <p>FlintCraft is a small custom development studio in Helena, Montana. We build websites for businesses that have earned their reputation.</p>
</body>
</html>
