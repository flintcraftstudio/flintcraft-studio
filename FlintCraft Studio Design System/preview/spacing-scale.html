<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Spacing</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0}body{background:var(--fc-birchwood);padding:22px;box-sizing:border-box;font-family:var(--fc-font-body)}
.row{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;align-items:end}
.item{text-align:center}
.bar{background:var(--fc-ember);margin:0 auto 10px;border-radius:2px}
.name{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--fc-bracken)}
.val{font-family:'SF Mono',ui-monospace,Menlo,monospace;font-size:11px;color:var(--fc-obsidian);margin-top:2px}
</style></head><body>
<div class="row">
  <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="name">xs</div><div class="val">4px</div></div>
  <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="name">sm</div><div class="val">8px</div></div>
  <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="name">md</div><div class="val">16px</div></div>
  <div class="item"><div class="bar" style="width:32px;height:32px"></div><div class="name">lg</div><div class="val">32px</div></div>
  <div class="item"><div class="bar" style="width:64px;height:64px"></div><div class="name">xl</div><div class="val">64px</div></div>
</div>
</body></html>
